<!DOCTYPE html>
<html>
<head>
  <title>Service Form</title>
  <link rel="stylesheet" href="form.css">
</head>
<style>
    body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #020617;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* SAME CARD DESIGN */
.form-container {
  width: 320px;
  padding: 25px;
  border-radius: 20px;

  background: linear-gradient(145deg, #0f172a, #1e293b);
  color: #fff;

  box-shadow: 
    0 0 25px rgba(59,130,246,0.3),
    inset 0 0 10px rgba(255,255,255,0.05);

  text-align: center;
}

/* Heading */
.form-container h2 {
  margin-bottom: 15px;
}

/* Inputs */
.form-container input,
.form-container textarea,
.form-container select {
  width: 100%;
  margin: 10px 0;
  padding: 10px;

  border-radius: 10px;
  border: none;
  outline: none;

  background: #020617;
  color: #fff;
}

/* Button */
.form-container button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;

  border-radius: 10px;
  border: none;

  background: linear-gradient(45deg, #3b82f6, #06b6d4);
  color: white;
  font-weight: bold;

  cursor: pointer;
}

.form-container button:hover {
  transform: scale(1.05);
}
    </style>
<body>

<div class="form-container">
  <h2 id="formTitle">Service Form</h2>

  <form id="dynamicForm"></form>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const service = params.get("service");

const form = document.getElementById("dynamicForm");
const title = document.getElementById("formTitle");

title.innerText = service;

// Different forms
if (service === "Travel Services") {
  form.innerHTML = `
    <input type="text" placeholder="Your Name" required>
    <input type="email" placeholder="Email" required>
    <input type="text" placeholder="Destination">
    <textarea placeholder="Travel Plan"></textarea>
    <button>Submit</button>
  `;
}

else if (service === "Hotel Reservation") {
  form.innerHTML = `
    <input type="text" placeholder="Your Name">
    <input type="date">
    <input type="number" placeholder="Guests">
    <select>
      <option>5-Star</option>
      <option>Heritage</option>
      <option>Boutique</option>
    </select>
    <button>Book Hotel</button>
  `;
}

else if (service === "Transportation") {
  form.innerHTML = `
    <input type="text" placeholder="Pickup Location">
    <input type="text" placeholder="Drop Location">
    <input type="time">
    <button>Book Ride</button>
  `;
}

else if (service === "Adventure Activities") {
  form.innerHTML = `
    <input type="text" placeholder="Your Name">
    <select>
      <option>Trekking</option>
      <option>Safari</option>
      <option>Water Sports</option>
    </select>
    <input type="date">
    <button>Join Activity</button>
  `;
}

else if (service === "Travelling Guide") {
  form.innerHTML = `
    <input type="text" placeholder="Your Name">
    <input type="text" placeholder="Location">
    <textarea placeholder="Need guidance about..."></textarea>
    <button>Get Guide</button>
  `;
}

else if (service === "24/7 Travel Support") {
  form.innerHTML = `
    <input type="text" placeholder="Your Name">
    <input type="tel" placeholder="Phone">
    <textarea placeholder="Your Issue"></textarea>
    <button>Request Support</button>
  `;
}
</script>

</body>
</html>
